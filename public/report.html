<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>工事写真報告書作成ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
:root{
  --navy:#1A3A5C;--orange:#E07B39;--bg:#F0F4F8;--white:#fff;
  --border:#E2E8F0;--text:#1F2937;--muted:#6B7280;
  --green:#059669;--red:#DC2626;--blue:#2563EB;
  --shadow:0 2px 10px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text)}
.hdr{background:var(--navy);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.hdr-back{background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:inherit}
.hdr-title{font-weight:800;font-size:16px}
.hdr-sub{font-size:10px;opacity:.5}
.main{padding:14px;max-width:560px;margin:0 auto;padding-bottom:120px}
.card{background:var(--white);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-ttl{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:10px}
.field label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:15px;background:#FAFBFC;color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy);background:#fff}
.field textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;width:100%}
.btn:active{transform:scale(.97);opacity:.88}
.btn-green{background:var(--green);color:#fff;font-size:16px;padding:15px}
.btn-ghost{background:#F3F4F6;color:#374151}
.btn-red-soft{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
.type-row{display:flex;gap:8px;margin-bottom:4px}
.type-btn{flex:1;padding:14px 8px;border-radius:12px;border:2.5px solid var(--border);font-size:13px;font-weight:800;cursor:pointer;background:#fff;color:var(--muted);text-align:center;transition:all .18s;font-family:inherit}
.type-btn.active{border-color:var(--navy);background:#EFF6FF;color:var(--navy)}
.type-btn .type-icon{font-size:22px;display:block;margin-bottom:4px}
.union-badge{display:inline-block;background:#FFF7ED;color:var(--orange);border:1.5px solid #FED7AA;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;margin-left:8px}
.drop-zone{border:3px dashed #93C5FD;border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;background:#F0F7FF;margin-bottom:14px}
.drop-zone.drag-over{background:#DBEAFE;border-color:var(--blue);transform:scale(1.01)}
.drop-zone .dz-icon{font-size:40px;margin-bottom:8px;display:block}
.drop-zone .dz-title{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:4px}
.drop-zone .dz-sub{font-size:11px;color:var(--muted)}
#bulk-input{display:none}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.photo-card{background:#fff;border-radius:12px;border:2px solid var(--border);overflow:hidden;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:box-shadow .2s,opacity .2s,transform .2s;user-select:none;touch-action:none}
.photo-card.dragging{opacity:.45;box-shadow:0 8px 28px rgba(0,0,0,.25);transform:scale(.97);z-index:100}
.photo-card.drag-over-target{border-color:var(--orange);box-shadow:0 0 0 3px rgba(224,123,57,.35)}
.card-no{position:absolute;top:6px;left:6px;z-index:10;background:var(--navy);color:#fff;border-radius:6px;padding:2px 7px;font-size:11px;font-weight:900;pointer-events:none}
.photo-thumb{width:100%;aspect-ratio:4/3;background:#F1F5F9;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.photo-thumb .thumb-ph{text-align:center;color:#CBD5E1;font-size:11px;pointer-events:none}
.photo-thumb .thumb-ph span{font-size:28px;display:block;margin-bottom:4px}
.drag-handle{position:absolute;top:6px;right:6px;z-index:10;background:rgba(26,58,92,.72);color:#fff;border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:grab;touch-action:none;line-height:1}
.drag-handle:active{cursor:grabbing}
.card-body{padding:8px 8px 10px}
.caption-input{width:100%;padding:7px 9px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;background:#FAFBFC;color:var(--text);font-family:inherit;outline:none;resize:none;overflow:hidden;min-height:34px}
.caption-input:focus{border-color:var(--navy);background:#fff}
.card-actions{display:flex;gap:5px;margin-top:7px}
.act-btn{flex:1;padding:6px 4px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:2px}
.act-rot-l{background:#EFF6FF;color:var(--blue);border:1px solid #BFDBFE}
.act-rot-r{background:#EFF6FF;color:var(--blue);border:1px solid #BFDBFE}
.act-del{background:#FEF2F2;color:var(--red);border:1px solid #FECACA}
.act-replace{background:#F3F4F6;color:#374151;border:1px solid var(--border)}
.sort-hint{font-size:11px;color:var(--muted);text-align:center;padding:8px;background:#F8FAFC;border-radius:8px;margin-bottom:10px}
.pv-page{background:#fff;border:2px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.pv-page-hdr{background:var(--navy);color:#fff;padding:6px 14px;font-size:11px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.pv-row{display:flex;border-bottom:1px solid var(--border)}
.pv-row:last-child{border-bottom:none}
.pv-img{width:62%;overflow:hidden;background:#F1F5F9;aspect-ratio:4/3;flex-shrink:0}
.pv-img img{width:100%;height:100%;object-fit:cover;display:block}
.pv-info{flex:1;border-left:1px solid var(--border);padding:8px 10px;display:flex;flex-direction:column}
.pv-no-lbl{font-size:9px;color:var(--muted)}
.pv-no{font-size:22px;font-weight:900;color:var(--navy);line-height:1.1}
.pv-cap{font-size:10px;color:var(--text);line-height:1.65;margin-top:4px;border-top:1px solid var(--border);padding-top:4px;white-space:pre-wrap;word-break:break-all}
.q-row{display:flex;gap:6px;margin-top:6px}
.q-btn{flex:1;padding:8px 4px;border-radius:8px;border:2px solid var(--border);font-size:11px;font-weight:700;cursor:pointer;background:#fff;color:var(--muted);text-align:center;transition:all .15s}
.q-btn.active{border-color:var(--navy);background:#EFF6FF;color:var(--navy)}
.loading{position:fixed;inset:0;background:rgba(8,18,40,.88);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.18);border-top-color:var(--orange);border-radius:50%;animation:spin .75s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-t{font-size:15px;font-weight:800}
.loading-s{font-size:12px;opacity:.6;margin-top:5px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--navy);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:500;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;max-width:92vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 48px;width:100%;max-height:80vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:#E5E7EB;border-radius:2px;margin:0 auto 16px}
.modal-ttl{font-size:16px;font-weight:800;margin-bottom:10px}
.modal-msg{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.7}
.divider{height:1px;background:var(--border);margin:12px 0}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:#FFF7ED;color:var(--orange)}
</style>
</head>
<body>
<div class="hdr">
  <button class="hdr-back" onclick="window.location.href='https://igumi-kanri.vercel.app'">← ホーム</button>
  <div style="flex:1">
    <div class="hdr-title">工事写真報告書作成</div>
    <div class="hdr-sub">IGUMI 工事管理システム</div>
  </div>
</div>

<div class="main">

  <!-- タイプ選択 -->
  <div class="card">
    <div class="card-ttl">📄 報告書タイプ</div>
    <div class="type-row">
      <button class="type-btn active" id="type-normal" onclick="setType('normal')">
        <span class="type-icon">📋</span>通常
      </button>
      <button class="type-btn" id="type-tama" onclick="setType('tama')">
        <span class="type-icon">🏗</span>多摩
      </button>
      <button class="type-btn" id="type-union" onclick="setType('union')">
        <span class="type-icon">🏢</span>ユニオン
      </button>
    </div>
  </div>

  <!-- ユニオン専用：調査報告書情報 -->
  <div class="card" id="union-card" style="display:none">
    <div class="card-ttl">📋 調査報告書<span class="union-badge">ユニオン専用</span></div>
    <div class="field"><label>建築物名称 *（表紙・報告書にリンク）</label><input type="text" id="u-building" placeholder="例: 〇〇マンション"></div>
    <div class="field"><label>住所</label><input type="text" id="u-address" placeholder="例: 東京都〇〇市〇〇町１丁目２３－４"></div>
    <div class="field"><label>工事名称 *（表紙・報告書にリンク）</label><input type="text" id="u-workname" placeholder="例: 101 201号室漏水調査"></div>
    <div class="field"><label>作業実施日</label><input type="date" id="u-date"></div>
    <div class="field"><label>作業者</label><input type="text" id="u-worker" placeholder="例: 﨑岡"></div>
    <div class="field"><label>会社名（表紙下部）</label><input type="text" id="u-company" placeholder="例: 株式会社IGUMI"></div>
    <div class="field">
      <label>作業内容（1行ずつ入力・Enterで改行）</label>
      <textarea id="u-content" placeholder="例:&#10;101号室&#10;現着時リビング・洋室の天井から落水あり&#10;養生施工&#10;被害直上201号室はご不在の為バルブを閉栓し一時対応" rows="6"></textarea>
    </div>
  </div>

  <!-- 基本情報（通常・多摩共通） -->
  <div class="card" id="basic-card">
    <div class="card-ttl">📋 基本情報</div>
    <div class="field"><label>物件名 *</label><input type="text" id="prop-name" placeholder="例: 〇〇マンション" oninput="refreshPreview()"></div>
    <div class="field"><label>住所</label><input type="text" id="prop-address" placeholder="例: 東京都〇〇市〇〇町１丁目２３－４"></div>
    <div class="field"><label>件名 *</label><input type="text" id="work-name" placeholder="例:  101 201号室漏水調査" oninput="refreshPreview()"></div>
    <div class="field"><label>作業日 *</label><input type="date" id="work-date" oninput="refreshPreview()"></div>
    <div class="field"><label>施工者</label><input type="text" id="worker" placeholder="例: 﨑岡"></div>
    <div class="field" id="content-field" style="display:none">
      <label>内容</label>
      <input type="text" id="work-content" placeholder="例: マスカー養生　バルブ閉栓">
    </div>
  </div>

  <!-- 写真 -->
  <div class="card">
    <div class="card-ttl">📸 写真 <span class="badge" id="photo-badge">0枚</span></div>
    <div class="drop-zone" id="drop-zone"
      onclick="document.getElementById('bulk-input').click()"
      ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <span class="dz-icon">📁</span>
      <div class="dz-title">写真をまとめて追加</div>
      <div class="dz-sub">タップして複数選択 / ファイルをここにドロップ</div>
    </div>
    <input type="file" id="bulk-input" accept="image/*" multiple onchange="onBulkSelect(this)">
    <div id="sort-hint" class="sort-hint" style="display:none">☰ カードを長押しまたはドラッグで順番を入れ替えられます</div>
    <div class="grid" id="grid"></div>
    <div id="no-photo-msg" style="text-align:center;padding:20px 16px;color:var(--muted)">
      <div style="font-size:12px">上のエリアから写真を追加してください</div>
    </div>
  </div>

  <!-- 出力設定 -->
  <div class="card">
    <div class="card-ttl">⚙️ 出力設定</div>
    <div class="field">
      <label>ファイル名</label>
     例: 〇〇マンション101号室201号室漏水調査報告書
      <div style="font-size:10px;color:var(--muted);margin-top:4px">空欄の場合は物件名・件名・日付から自動生成</div>
    </div>
    <div class="field" style="margin-top:2px">
      <label>写真品質（容量調整）</label>
      <div class="q-row">
        <button class="q-btn" onclick="setQ(0.85,this)">高品質</button>
        <button class="q-btn active" onclick="setQ(0.70,this)">標準</button>
        <button class="q-btn" onclick="setQ(0.50,this)">圧縮</button>
        <button class="q-btn" onclick="setQ(0.30,this)">最小</button>
      </div>
    </div>
    <div class="field" style="margin-top:10px">
      <label>写真の最大サイズ</label>
      <select id="maxpx">
        <option value="1920">高解像度（1920px）</option>
        <option value="1280" selected>標準（1280px・推奨）</option>
        <option value="960">中（960px）</option>
        <option value="640">小（640px）</option>
      </select>
    </div>
  </div>

  <!-- プレビュー -->
  <div class="card">
    <div class="card-ttl">👁 プレビュー <span id="pv-badge" style="font-size:11px;color:var(--muted);font-weight:600"></span></div>
    <div id="pv-body">
      <div style="text-align:center;padding:24px;color:var(--muted)">
        <div style="font-size:36px;margin-bottom:8px">📂</div>
        <div style="font-size:13px">写真を追加するとここに表示されます</div>
      </div>
    </div>
  </div>

  <!-- 出力・保存 -->
  <div class="card">
    <div class="card-ttl">📤 出力・保存</div>
    <button class="btn btn-green" onclick="exportXlsx()" style="margin-bottom:10px">📊 XLSXで報告書を出力</button>
    <div class="divider"></div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:10px">作業データを保存・読み込みできます（写真含む）</p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="saveData()" style="flex:1">💾 保存</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('load-input').click()" style="flex:1">📂 読込</button>
      <button class="btn btn-red-soft btn-sm" onclick="confirmReset()" style="flex:1">🗑 リセット</button>
    </div>
    <input type="file" id="load-input" accept=".json" style="display:none" onchange="loadData(event)">
  </div>

</div>

<div class="loading" id="loading" style="display:none">
  <div class="spinner"></div>
  <div class="loading-t" id="loading-t">処理中...</div>
  <div class="loading-s" id="loading-s"></div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-ov" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-ttl" id="modal-ttl"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="closeModal()" style="flex:1">キャンセル</button>
      <button class="btn btn-red-soft" id="modal-ok" style="flex:1">実行</button>
    </div>
  </div>
</div>

<script>
let photos=[], nextId=1, quality=0.70, reportType='normal';
let dragSrcId=null, touchDragId=null, touchClone=null;

document.getElementById('work-date').value = new Date().toISOString().split('T')[0];
document.getElementById('u-date').value = new Date().toISOString().split('T')[0];

function setType(type) {
  reportType = type;
  ['normal','tama','union'].forEach(t => document.getElementById('type-'+t).classList.toggle('active', t===type));
  document.getElementById('union-card').style.display = type==='union' ? 'block' : 'none';
  document.getElementById('basic-card').style.display = type==='union' ? 'none' : 'block';
  document.getElementById('content-field').style.display = type==='tama' ? 'block' : 'none';
  const placeholders = {
    normal: '例: 報告書　〇〇マンション101　201　▽月□日　漏水調査',
    tama:   '例: 20260601　〇〇マンション　101号室201号室漏水調査報告書',
    union:  '例: 〇〇マンション101号室201号室漏水調査報告書'
  };
  document.getElementById('filename').placeholder = placeholders[type];
}

function setQ(q,btn) { quality=q; document.querySelectorAll('.q-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
function onDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function onDragLeave(e) { document.getElementById('drop-zone').classList.remove('drag-over'); }
function onDrop(e) { e.preventDefault(); document.getElementById('drop-zone').classList.remove('drag-over'); const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')); if(files.length) processBulkFiles(files); }
function onBulkSelect(input) { const files=Array.from(input.files); if(files.length) processBulkFiles(files); input.value=''; }

async function processBulkFiles(files) {
  showLoading(`写真を処理中... 0/${files.length}`,'EXIF補正・リサイズ'); await sleep(60);
  for(let i=0;i<files.length;i++) {
    document.getElementById('loading-s').textContent=`${i+1}/${files.length} 枚目を処理中`;
    await new Promise(resolve => { processPhoto(files[i],(dataUrl)=>{ const id=nextId++; photos.push({id,dataUrl,caption:''}); resolve(); }); });
  }
  rebuildGrid(); updateBadge(); refreshPreview(); hideLoading(); showToast(`✅ ${files.length}枚を追加しました`);
}

function processPhoto(file,cb) {
  const reader=new FileReader();
  reader.onload=(e)=>{
    const orient=getExifOrientation(e.target.result);
    const img=new Image();
    img.onload=()=>{
      const maxPx=parseInt(document.getElementById('maxpx').value)||1280;
      let w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){if(w>=h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      let rotDeg=0;
      if(orient===3)rotDeg=180;else if(orient===6)rotDeg=90;else if(orient===8)rotDeg=-90;
      const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');
      if(rotDeg===90||rotDeg===-90){canvas.width=h;canvas.height=w;ctx.translate(canvas.width/2,canvas.height/2);ctx.rotate(rotDeg*Math.PI/180);ctx.drawImage(img,-w/2,-h/2,w,h);}
      else{canvas.width=w;canvas.height=h;if(rotDeg){ctx.translate(w/2,h/2);ctx.rotate(rotDeg*Math.PI/180);ctx.drawImage(img,-w/2,-h/2,w,h);}else{ctx.drawImage(img,0,0,w,h);}}
      cb(canvas.toDataURL('image/jpeg',quality));
    };
    img.src=URL.createObjectURL(file);
  };
  reader.readAsArrayBuffer(file);
}

function getExifOrientation(ab) {
  try{const v=new DataView(ab);if(v.getUint16(0,false)!==0xFFD8)return 1;let off=2;
    while(off<v.byteLength-4){const m=v.getUint16(off,false);const len=v.getUint16(off+2,false);
      if(m===0xFFE1){const base=off+4;if(v.getUint32(base,false)!==0x45786966)return 1;const le=v.getUint16(base+6,false)===0x4949;const ifd=base+6+v.getUint32(base+10,le);const n=v.getUint16(ifd,le);
        for(let i=0;i<n;i++){if(v.getUint16(ifd+2+i*12,le)===0x0112)return v.getUint16(ifd+2+i*12+8,le);}}off+=2+len;}
  }catch(e){}return 1;
}

function rebuildGrid() {
  const grid=document.getElementById('grid'); grid.innerHTML='';
  document.getElementById('no-photo-msg').style.display=photos.length===0?'block':'none';
  document.getElementById('sort-hint').style.display=photos.length>1?'block':'none';
  photos.forEach((p,idx)=>grid.appendChild(makeCard(p,idx+1))); updateBadge();
}

function makeCard(p,no) {
  const div=document.createElement('div'); div.className='photo-card'; div.id='card-'+p.id; div.dataset.id=p.id;
  div.innerHTML=`<div class="card-no">${no}</div><div class="drag-handle" title="ドラッグで並び替え">☰</div>
    <div class="photo-thumb" onclick="replacePhoto(${p.id})">${p.dataUrl?`<img src="${p.dataUrl}" alt="" id="img-${p.id}">`:`<div class="thumb-ph"><span>📷</span>タップして追加</div>`}</div>
    <div class="card-body"><textarea class="caption-input" id="cap-${p.id}" placeholder="キャプション..." oninput="autoResize(this);onCaptionChange(${p.id},this.value)" rows="2">${esc(p.caption)}</textarea>
    <div class="card-actions">
      <button class="act-btn act-rot-l" onclick="rotatePhoto(${p.id},-90)">↺</button>
      <button class="act-btn act-rot-r" onclick="rotatePhoto(${p.id},90)">↻</button>
      <button class="act-btn act-replace" onclick="replacePhoto(${p.id})">🔄</button>
      <button class="act-btn act-del" onclick="deletePhoto(${p.id})">🗑</button>
    </div><input type="file" accept="image/*" id="rep-${p.id}" style="display:none" onchange="onReplace(${p.id},this)"></div>`;
  setupDrag(div,p.id); return div;
}

function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function onCaptionChange(id,val){const p=photos.find(x=>x.id===id);if(p)p.caption=val;refreshPreview();}
function updateBadge(){document.getElementById('photo-badge').textContent=photos.length+'枚';}
function replacePhoto(id){document.getElementById('rep-'+id).click();}
function onReplace(id,input){
  const file=input.files[0];if(!file)return;input.value='';showLoading('写真を差し替え中...');
  processPhoto(file,(dataUrl)=>{
    const p=photos.find(x=>x.id===id);if(p)p.dataUrl=dataUrl;
    const imgEl=document.getElementById('img-'+id);
    if(imgEl){imgEl.src=dataUrl;}else{const thumb=document.querySelector(`#card-${id} .photo-thumb`);if(thumb)thumb.innerHTML=`<img src="${dataUrl}" alt="" id="img-${id}">`;}
    hideLoading();refreshPreview();showToast('🔄 差し替えました');
  });
}
function deletePhoto(id){photos=photos.filter(p=>p.id!==id);rebuildGrid();refreshPreview();}
function rotatePhoto(id,deg){
  const p=photos.find(x=>x.id===id);if(!p||!p.dataUrl)return;
  const img=new Image();
  img.onload=()=>{
    const rad=deg*Math.PI/180;const sin=Math.abs(Math.sin(rad)),cos=Math.abs(Math.cos(rad));
    const nw=Math.round(img.width*cos+img.height*sin);const nh=Math.round(img.width*sin+img.height*cos);
    const canvas=document.createElement('canvas');canvas.width=nw;canvas.height=nh;
    const ctx=canvas.getContext('2d');ctx.translate(nw/2,nh/2);ctx.rotate(rad);ctx.drawImage(img,-img.width/2,-img.height/2);
    p.dataUrl=canvas.toDataURL('image/jpeg',quality);
    const imgEl=document.getElementById('img-'+id);if(imgEl)imgEl.src=p.dataUrl;
    refreshPreview();showToast('↻ 回転しました');
  };img.src=p.dataUrl;
}

function setupDrag(card,id){
  const handle=card.querySelector('.drag-handle');
  handle.addEventListener('mousedown',()=>{card.setAttribute('draggable','true');});
  card.addEventListener('dragstart',(e)=>{dragSrcId=id;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);});
  card.addEventListener('dragend',()=>{dragSrcId=null;card.classList.remove('dragging');card.setAttribute('draggable','false');document.querySelectorAll('.drag-over-target').forEach(el=>el.classList.remove('drag-over-target'));});
  card.addEventListener('dragover',(e)=>{e.preventDefault();if(dragSrcId!==id)card.classList.add('drag-over-target');});
  card.addEventListener('dragleave',()=>{card.classList.remove('drag-over-target');});
  card.addEventListener('drop',(e)=>{e.preventDefault();card.classList.remove('drag-over-target');if(dragSrcId!==null&&dragSrcId!==id)swapPhotos(dragSrcId,id);});
  handle.addEventListener('touchstart',(e)=>{
    touchDragId=id;const touch=e.touches[0];
    touchClone=card.cloneNode(true);
    touchClone.style.cssText=`position:fixed;z-index:9999;pointer-events:none;opacity:.8;width:${card.offsetWidth}px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.3);left:${touch.clientX-card.offsetWidth/2}px;top:${touch.clientY-card.offsetHeight/2}px;transform:scale(1.04);`;
    document.body.appendChild(touchClone);card.style.opacity='0.35';e.preventDefault();
  },{passive:false});
  handle.addEventListener('touchmove',(e)=>{
    if(!touchClone)return;const touch=e.touches[0];
    touchClone.style.left=(touch.clientX-touchClone.offsetWidth/2)+'px';touchClone.style.top=(touch.clientY-touchClone.offsetHeight/2)+'px';
    document.querySelectorAll('.drag-over-target').forEach(el=>el.classList.remove('drag-over-target'));
    const el=document.elementFromPoint(touch.clientX,touch.clientY);const target=el&&el.closest('.photo-card');
    if(target&&target.dataset.id!=touchDragId)target.classList.add('drag-over-target');e.preventDefault();
  },{passive:false});
  handle.addEventListener('touchend',(e)=>{
    if(!touchClone)return;const touch=e.changedTouches[0];
    if(touchClone){touchClone.remove();touchClone=null;}
    const srcCard=document.getElementById('card-'+touchDragId);if(srcCard)srcCard.style.opacity='';
    const el=document.elementFromPoint(touch.clientX,touch.clientY);const target=el&&el.closest('.photo-card');
    if(target&&target.dataset.id!=touchDragId)swapPhotos(touchDragId,parseInt(target.dataset.id));
    document.querySelectorAll('.drag-over-target').forEach(el=>el.classList.remove('drag-over-target'));touchDragId=null;
  });
}
function swapPhotos(srcId,dstId){
  srcId=parseInt(srcId);dstId=parseInt(dstId);
  const si=photos.findIndex(p=>p.id===srcId);const di=photos.findIndex(p=>p.id===dstId);
  if(si<0||di<0)return;[photos[si],photos[di]]=[photos[di],photos[si]];rebuildGrid();refreshPreview();
}

function refreshPreview(){
  const body=document.getElementById('pv-body');const badge=document.getElementById('pv-badge');
  const filled=photos.filter(p=>p.dataUrl);
  badge.textContent=filled.length>0?`${filled.length}枚 / ${Math.ceil(filled.length/3)}ページ`:'';
  if(photos.length===0){body.innerHTML=`<div style="text-align:center;padding:24px;color:var(--muted)"><div style="font-size:36px;margin-bottom:8px">📂</div><div style="font-size:13px">写真を追加するとここに表示されます</div></div>`;return;}
  let propName='',workName='',workDate='',worker='';
  if(reportType==='union'){propName=document.getElementById('u-building').value;workName=document.getElementById('u-workname').value;workDate=document.getElementById('u-date').value;worker=document.getElementById('u-worker').value;}
  else{propName=document.getElementById('prop-name').value;workName=document.getElementById('work-name').value;workDate=document.getElementById('work-date').value;worker=document.getElementById('worker').value;}
  let dateStr='';if(workDate){const d=new Date(workDate);dateStr=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;}
  let html=`<div style="background:#F8FAFC;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px">
    <div style="font-size:15px;font-weight:900;color:var(--navy);text-align:center;letter-spacing:.2em;margin-bottom:12px;border-bottom:2px solid var(--navy);padding-bottom:9px">工　事　写　真　帳</div>
    <table style="width:100%;border-collapse:collapse">
      ${[['物件名',propName],['件名',workName],['作業日',dateStr],['施工者',worker]].map(([l,v])=>`
      <tr><td style="font-size:11px;color:var(--muted);padding:5px 0;width:58px;font-weight:600">${l}</td><td style="font-size:13px;font-weight:700;padding:5px 0;border-bottom:1px solid var(--border)">${esc(v)}</td></tr>`).join('')}
    </table></div>`;
  const pageCount=Math.ceil(photos.length/3);
  for(let pg=0;pg<pageCount;pg++){
    const pagePh=photos.slice(pg*3,pg*3+3);
    html+=`<div class="pv-page"><div class="pv-page-hdr"><span>ページ ${pg+1}</span><span>${pagePh.length}枚</span></div>`;
    for(let i=0;i<3;i++){
      const p=pagePh[i];const globalNo=pg*3+i+1;
      if(p){html+=`<div class="pv-row"><div class="pv-img">${p.dataUrl?`<img src="${p.dataUrl}" alt="">`:''}</div><div class="pv-info"><div class="pv-no-lbl">No.</div><div class="pv-no">${globalNo}</div><div class="pv-cap">${esc(p.caption||'')}</div></div></div>`;}
      else{html+=`<div class="pv-row" style="opacity:.3"><div class="pv-img"></div><div style="flex:1;border-left:1px solid var(--border)"></div></div>`;}
    }
    html+=`</div>`;
  }
  body.innerHTML=html;
}

// ============================================================
// XLSX EXPORT
// ============================================================
async function exportXlsx() {
  const customFn=document.getElementById('filename').value.trim();

  if(reportType==='union'){
    const uBuilding=document.getElementById('u-building').value.trim();
    const uWorkname=document.getElementById('u-workname').value.trim();
    if(!uBuilding||!uWorkname){showToast('⚠️ 建築物名称と工事名称を入力してください');return;}
  } else {
    const propName=document.getElementById('prop-name').value.trim();
    const workName=document.getElementById('work-name').value.trim();
    if(!propName||!workName){showToast('⚠️ 物件名と件名を入力してください');return;}
  }
  if(photos.length===0){showToast('⚠️ 写真を1枚以上追加してください');return;}

  showLoading('XLSX生成中...',`${photos.length}枚を埋め込み中...`);await sleep(80);

  try{
    const wb=new ExcelJS.Workbook();wb.creator='IGUMI Report Tool';
    const thin={style:'thin'};
    const double={style:'double'};
    const minchoFont=(size,bold=false)=>({name:'ＭＳ 明朝',size,bold});

    if(reportType==='union'){
      await buildUnionWorkbook(wb,minchoFont,thin);
    } else {
      await buildNormalWorkbook(wb,minchoFont,thin,double);
    }

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    let filename;
    if(customFn){filename=customFn.replace(/[\\/:*?"<>|]/g,'');if(!filename.toLowerCase().endsWith('.xlsx'))filename+='.xlsx';}
    else{
      const safe=s=>s.replace(/[\\/:*?"<>|]/g,'').substring(0,20);
      let propName=reportType==='union'?document.getElementById('u-building').value.trim():document.getElementById('prop-name').value.trim();
      let workName=reportType==='union'?document.getElementById('u-workname').value.trim():document.getElementById('work-name').value.trim();
      let workDate=reportType==='union'?document.getElementById('u-date').value:document.getElementById('work-date').value;
      const datePart=workDate?workDate.replace(/-/g,''):'';
      const prefix=reportType==='union'?'調査報告書':reportType==='tama'?'報告書_多摩':'報告書';
      filename=`${prefix}_${safe(propName)}_${safe(workName)}_${datePart}.xlsx`;
    }
    saveAs(blob,filename);hideLoading();showToast(`✅ ${filename} を出力しました`);
  }catch(err){hideLoading();console.error(err);showToast('❌ エラー: '+err.message);}
}

// ============================================================
// 通常・多摩用ワークブック生成
// ============================================================
async function buildNormalWorkbook(wb, minchoFont, thin, double) {
  const propName=document.getElementById('prop-name').value.trim();
  const address=document.getElementById('prop-address').value.trim();
  const workName=document.getElementById('work-name').value.trim();
  const workDate=document.getElementById('work-date').value;
  const worker=document.getElementById('worker').value.trim();
  const workContent=document.getElementById('work-content').value;

  let dateStr='';
  if(workDate){const d=new Date(workDate);dateStr=`${d.getFullYear()}年 ${d.getMonth()+1}月${d.getDate()}日`;}

  // ─── 表紙シート ───
  const cws=wb.addWorksheet('表紙');
  cws.pageSetup.paperSize=9;cws.pageSetup.orientation='portrait';
  cws.pageSetup.margins={left:.197,right:.197,top:.197,bottom:.197,header:0,footer:0};

  // 列幅（実物に合わせる）
  const coverCols={A:4.875,B:11.25,C:9,D:9,E:9,F:9,G:9,H:11.875,I:4.5,J:9,K:5,L:4.875};
  Object.entries(coverCols).forEach(([c,w])=>{cws.getColumn(c).width=w;});

  // 行の高さ（実物に合わせる）
  [1,2,3,4,5].forEach(r=>{cws.getRow(r).height=30;});
  cws.getRow(6).height=45.75;
  cws.getRow(7).height=14.25;
  cws.getRow(10).height=17.25;
  cws.getRow(11).height=30;
  cws.getRow(12).height=65.1; cws.getRow(13).height=20.1;
  cws.getRow(14).height=65.1; cws.getRow(15).height=20.1;
  cws.getRow(16).height=65.1; cws.getRow(17).height=20.1;
  cws.getRow(18).height=65.1; cws.getRow(19).height=20.1;
  cws.getRow(20).height=65.1; cws.getRow(21).height=30;
  cws.getRow(22).height=30;

  // タイトル（C6:J6）
  cws.mergeCells('C6:J6');
  const titleCell=cws.getCell('C6');
  titleCell.value='工　事　写　真　帳';
  titleCell.font=minchoFont(30,true);
  titleCell.alignment={horizontal:'center',vertical:'middle'};
  titleCell.border={left:double,right:double,top:double,bottom:double};

  // 各項目（実物通りの位置）
  const items=[
    ['B12','物　　件　　名','D12:K12',propName],
    ['B14','住　　　　　所','D14:K14',address],
    ['B16','件　　　　　名','D16:K16',workName],
    ['B18','作　　業　　日','D18:K18',dateStr],
    ['B20','施　　工　　者','D20:K20',worker],
  ];

  // 多摩用：内容欄を追加
  if(reportType==='tama' && workContent.trim()){
    cws.getRow(21).height=65.1; cws.getRow(22).height=20.1;
    // 内容は複数行になるので最初の行だけラベル、値は1行目に
    items.push(['B22','内　　　　　容','D22:K22',workContent]);
  }

  items.forEach(([lc,lv,mr,val])=>{
    const c=cws.getCell(lc);
    c.value=lv;c.font=minchoFont(14);c.alignment={vertical:'middle'};
    cws.mergeCells(mr);
    const vc=cws.getCell(mr.split(':')[0]);
    vc.value=val;vc.font=minchoFont(14);vc.alignment={vertical:'middle'};
    vc.border={bottom:thin};
  });

  // 自由シート（空）
  wb.addWorksheet('自由シート');

  // 写真シート
  await buildPhotoSheets(wb,minchoFont,thin);
}

async function buildUnionWorkbook(wb, minchoFont, thin) {
  const uBuilding=document.getElementById('u-building').value.trim();
  const uAddress=document.getElementById('u-address').value.trim();
  const uWorkname=document.getElementById('u-workname').value.trim();
  const uDate=document.getElementById('u-date').value;
  const uWorker=document.getElementById('u-worker').value.trim();
  const uCompany=document.getElementById('u-company').value.trim();
  const uContent=document.getElementById('u-content').value;

  let uDateStr='';
  if(uDate){const d=new Date(uDate);uDateStr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

  // ─── 表紙シート（ユニオン用） ───
  const cws=wb.addWorksheet('表紙');
  cws.pageSetup.paperSize=9;cws.pageSetup.orientation='portrait';
  cws.pageSetup.margins={left:.197,right:.197,top:.197,bottom:.197,header:0,footer:0};

  // 列幅（ユニオン実物：A=3.49 B=4.62 その他デフォルト）
  cws.getColumn('A').width=3.49;
  cws.getColumn('B').width=4.62;

  // 全行の高さ（実物は13.5）
  for(let r=1;r<=60;r++){cws.getRow(r).height=13.5;}
  cws.getRow(2).height=12.75;cws.getRow(3).height=12.75;
  cws.getRow(4).height=12.75;cws.getRow(5).height=12.75;

  // 建物名称（E11:P13）
  cws.mergeCells('E11:P13');
  const buildingCell=cws.getCell('E11');
  buildingCell.value=uBuilding;
  buildingCell.font={name:'ＭＳ Ｐ明朝',size:16};
  buildingCell.alignment={horizontal:'center',vertical:'middle'};

  // 工事名称（D15:Q18）
  cws.mergeCells('D15:Q18');
  const worknameCell=cws.getCell('D15');
  worknameCell.value=uWorkname;
  worknameCell.font={name:'ＭＳ Ｐ明朝',size:14};
  worknameCell.alignment={horizontal:'center',vertical:'middle'};

  // 作業日（F41:O43）
  cws.mergeCells('F41:O43');
  const dateCell=cws.getCell('F41');
  dateCell.value=uDateStr;
  dateCell.font={name:'ＭＳ Ｐ明朝',size:12};
  dateCell.alignment={horizontal:'center',vertical:'middle'};

  // 会社名（F52:O54）
  cws.mergeCells('F52:O54');
  const companyCell=cws.getCell('F52');
  companyCell.value=uCompany;
  companyCell.font={name:'ＭＳ Ｐ明朝',size:12};
  companyCell.alignment={horizontal:'center',vertical:'middle'};

  // ─── 報告書シート ───
  const rws=wb.addWorksheet('報告書');
  rws.pageSetup.paperSize=9;rws.pageSetup.orientation='portrait';
  rws.pageSetup.margins={left:.197,right:.197,top:.197,bottom:.197,header:0,footer:0};

  // 全行の高さ
  for(let r=1;r<=50;r++){rws.getRow(r).height=13.5;}
  rws.getRow(2).height=12.75;rws.getRow(3).height=12.75;
  rws.getRow(4).height=12.75;rws.getRow(25).height=14.25;
  [27,28,29,30,31,32,33,34].forEach(r=>{rws.getRow(r).height=14.25;});
  [36,37,38,39].forEach(r=>{rws.getRow(r).height=14.25;});

  // タイトル「調査報告書」（B2:S4）
  rws.mergeCells('B2:S4');
  const rtitleCell=rws.getCell('B2');
  rtitleCell.value='調査報告書';
  rtitleCell.font={name:'ＭＳ Ｐ明朝',size:22};
  rtitleCell.alignment={horizontal:'center',vertical:'middle'};

  // 各ラベルと値（リンク付き）
  const reportItems=[
    [5,'建築物名称',{formula:`表紙!E11`}],
    [8,'住所',uAddress],
    [11,'工事名称',{formula:`表紙!D15`}],
    [14,'作業実施日',uDateStr],
    [17,'作業者',uWorker],
  ];

  reportItems.forEach(([rowNum,label,val])=>{
    // ラベル（B・C列結合）
    rws.mergeCells(`B${rowNum}:B${rowNum+2}`);
    rws.mergeCells(`C${rowNum}:E${rowNum+2}`);
    const lc=rws.getCell(`C${rowNum}`);

    if(typeof val==='object'&&val.formula){
      vc.value={formula:val.formula};
    } else {
      vc.value=val;
    }
    vc.font={name:'ＭＳ Ｐ明朝',size:12};vc.alignment={vertical:'middle'};
    vc.border={bottom:thin};
  });

  // 【作業内容】タイトル（C21:G22）
  rws.mergeCells('C21:G22');
  const contentTitleCell=rws.getCell('C21');
  contentTitleCell.value='【　作　業　内　容　】';
  contentTitleCell.font={name:'ＭＳ Ｐ明朝',size:12};
  contentTitleCell.alignment={horizontal:'center',vertical:'middle'};

  // 作業内容（1行ずつC23:Q23〜）
  const contentLines=uContent.split('\n').filter(l=>l.trim());
  contentLines.forEach((line,i)=>{
    const r=23+i;
    if(r>36)return;
    rws.mergeCells(`C${r}:Q${r}`);
    const cc=rws.getCell(`C${r}`);
    cc.value=line;
    cc.font={name:'ＭＳ Ｐ明朝',size:12};
    cc.alignment={vertical:'middle'};
  });

  // （別紙写真添付参照）
  rws.mergeCells('C37:I38');
  const refCell=rws.getCell('C37');
  refCell.value='（別紙写真添付参照）';
  refCell.font={name:'ＭＳ Ｐ明朝',size:12};

  // 上記の作業を実施いたしました
  rws.mergeCells('J40:R41');
  const doneCell=rws.getCell('J40');
  doneCell.value='上記の作業を実施いたしました。';
  doneCell.font={name:'ＭＳ Ｐ明朝',size:12};
  doneCell.alignment={vertical:'middle'};

  // 【備考】
  rws.mergeCells('C45:G46');
  const bikoCell=rws.getCell('C45');
  bikoCell.value='【　備　　　　　考　】';
  bikoCell.font={name:'ＭＳ Ｐ明朝',size:12};
  bikoCell.alignment={horizontal:'center',vertical:'middle'};

  // 写真シート
  await buildPhotoSheets(wb,minchoFont,thin);
}

// ============================================================
// 写真シート共通生成
// ============================================================
async function buildPhotoSheets(wb, minchoFont, thin) {
  const pageCount=Math.ceil(photos.length/3);

  for(let pg=0;pg<pageCount;pg++){
    const pagePh=photos.slice(pg*3,pg*3+3);
    const ws=wb.addWorksheet(String(pg+1).padStart(3,'0'));
    ws.pageSetup.paperSize=9;ws.pageSetup.orientation='portrait';
    ws.pageSetup.margins={left:.197,right:.197,top:.197,bottom:.197,header:0,footer:0};

    // 列幅（実物に合わせる）
    const photoCols={A:2.875,B:9,C:9,D:9,E:9,F:9,G:9,H:11.875,I:4.5,J:9,K:5,L:5};
    Object.entries(photoCols).forEach(([c,w])=>{ws.getColumn(c).width=w;});

    // 行の高さ（実物：No.行=17.25、写真行=30、それ以外=None）
    [3,15,27].forEach(r=>{ws.getRow(r).height=17.25;});
    [4,5,6,7,8,9,10,11,16,17,18,19,20,21,22,23,28,29,30,31,32,33,34,35].forEach(r=>{ws.getRow(r).height=30;});

    // 3枚分のブロック
    const blocks=[
      {imgTlRow:2,imgBrRow:12,noRow:3,captStart:4},
      {imgTlRow:14,imgBrRow:24,noRow:15,captStart:16},
      {imgTlRow:26,imgBrRow:36,noRow:27,captStart:28},
    ];

    for(let bi=0;bi<pagePh.length;bi++){
      const p=pagePh[bi];
      const blk=blocks[bi];
      const globalNo=pg*3+bi+1;

      // No.（J列）
      const noCell=ws.getCell(blk.noRow,10);
      noCell.value='No.';noCell.font=minchoFont(14);noCell.alignment={vertical:'center'};
      const noValCell=ws.getCell(blk.noRow,11);
      noValCell.value=globalNo;noValCell.font=minchoFont(14);noValCell.alignment={vertical:'center'};

      // キャプション（J列・結合・1行ずつ）
      const capLines=splitCaption(p.caption||'',8);
      capLines.forEach((line,li)=>{
        const r1=blk.captStart+li;
        ws.mergeCells(r1,10,r1,12);
        const cell=ws.getCell(r1,10);
        cell.value=line;cell.font=minchoFont(11);
        cell.alignment={vertical:'center',wrapText:true};
      });

      // 写真埋め込み（B列〜H列、実物通りの位置）
      if(p.dataUrl){
        const imgBase64=await toJpegBase64(p.dataUrl,quality);
        const imgId=wb.addImage({base64:imgBase64,extension:'jpeg'});
        ws.addImage(imgId,{
          tl:{col:1,row:blk.imgTlRow},
          br:{col:8,row:blk.imgBrRow},
          editAs:'twoCell'
        });
      }
      document.getElementById('loading-s').textContent=`ページ${pg+1}/${pageCount} 写真${bi+1}/3`;
      await sleep(5);
    }
  }
}

// ============================================================
// SAVE / LOAD
// ============================================================
function saveData(){
  const data={reportType,
    cover:{propName:document.getElementById('prop-name').value,address:document.getElementById('prop-address').value,workName:document.getElementById('work-name').value,workDate:document.getElementById('work-date').value,worker:document.getElementById('worker').value,content:document.getElementById('work-content').value,filename:document.getElementById('filename').value},
    union:{building:document.getElementById('u-building').value,address:document.getElementById('u-address').value,workname:document.getElementById('u-workname').value,date:document.getElementById('u-date').value,worker:document.getElementById('u-worker').value,company:document.getElementById('u-company').value,content:document.getElementById('u-content').value},
    quality,photos:photos.map(p=>({id:p.id,dataUrl:p.dataUrl,caption:p.caption})),nextId};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const name=reportType==='union'?document.getElementById('u-building').value:document.getElementById('prop-name').value;
  a.download=`報告書データ_${name||'untitled'}_${new Date().toISOString().split('T')[0]}.json`;
  a.href=url;a.click();URL.revokeObjectURL(url);showToast('💾 データを保存しました');
}

function loadData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.reportType)setType(data.reportType);
      if(data.cover){
        document.getElementById('prop-name').value=data.cover.propName||'';
        document.getElementById('prop-address').value=data.cover.address||'';
        document.getElementById('work-name').value=data.cover.workName||'';
        document.getElementById('work-date').value=data.cover.workDate||'';
        document.getElementById('worker').value=data.cover.worker||'';
        document.getElementById('work-content').value=data.cover.content||'';
        document.getElementById('filename').value=data.cover.filename||'';
      }
      if(data.union){
        document.getElementById('u-building').value=data.union.building||'';
        document.getElementById('u-address').value=data.union.address||'';
        document.getElementById('u-workname').value=data.union.workname||'';
        document.getElementById('u-date').value=data.union.date||'';
        document.getElementById('u-worker').value=data.union.worker||'';
        document.getElementById('u-company').value=data.union.company||'';
        document.getElementById('u-content').value=data.union.content||'';
      }
      if(data.quality)quality=data.quality;
      photos=[];nextId=data.nextId||1;
      (data.photos||[]).forEach(p=>photos.push({id:p.id,dataUrl:p.dataUrl||null,caption:p.caption||''}));
      rebuildGrid();refreshPreview();showToast('📂 読み込みました（'+photos.length+'枚）');
    }catch(err){showToast('❌ 読み込み失敗: '+err.message);}
  };
  reader.readAsText(file);e.target.value='';
}

function toJpegBase64(dataUrl,q){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');canvas.width=img.width;canvas.height=img.height;
      canvas.getContext('2d').drawImage(img,0,0);
      resolve(canvas.toDataURL('image/jpeg',q||0.85).replace(/^data:image\/jpeg;base64,/,''));
    };img.src=dataUrl;
  });
}

function splitCaption(text,maxLines){
  if(!text)return[''];const result=[];
  for(const line of text.split(/\n/)){
    if(result.length>=maxLines)break;
    for(let i=0;i<line.length;i+=12){if(result.length>=maxLines)break;result.push(line.substring(i,i+12));}
  }
  return result.length>0?result:[''];
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function showLoading(t,s){document.getElementById('loading').style.display='flex';document.getElementById('loading-t').textContent=t||'処理中...';document.getElementById('loading-s').textContent=s||'';}
function hideLoading(){document.getElementById('loading').style.display='none';}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3200);}
function closeModal(){document.getElementById('modal').style.display='none';}
function confirmReset(){
  document.getElementById('modal-ttl').textContent='⚠️ 全データをリセット';
  document.getElementById('modal-msg').textContent='全ての写真と入力データが削除されます。取り消せません。';
  document.getElementById('modal-ok').onclick=()=>{
    photos=[];nextId=1;rebuildGrid();refreshPreview();
    ['prop-name','prop-address','work-name','worker','work-content','u-building','u-address','u-workname','u-worker','u-company','u-content'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('work-date').value=new Date().toISOString().split('T')[0];
    document.getElementById('u-date').value=new Date().toISOString().split('T')[0];
    closeModal();showToast('🗑 リセットしました');
  };
  document.getElementById('modal').style.display='flex';
}
</script>
