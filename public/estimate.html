<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>見積書作成 - 株式会社IGUMI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#1a237e,#283593);color:white;padding:16px 28px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header h1{font-size:20px;font-weight:700}
.header span{font-size:12px;opacity:.8}
.container{max-width:940px;margin:20px auto;padding:0 14px}
.card{background:white;border-radius:12px;padding:20px 24px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-title{font-size:13px;font-weight:700;color:#1a237e;border-left:4px solid #1a237e;padding-left:9px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.field label{display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:4px}
.field input,.field textarea{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;font-family:inherit;background:#fafafa;transition:border-color .2s}
.field input:focus,.field textarea:focus{outline:none;border-color:#1a237e;background:white}
.field textarea{resize:vertical;min-height:52px}
.req{color:#e53935}
/* 担当者 */
.tanto-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tanto-badge{display:inline-block;padding:5px 14px;border-radius:20px;border:2px solid #c5cae9;font-size:12px;font-weight:600;cursor:pointer;color:#1a237e;background:white;transition:all .15s;user-select:none}
.tanto-badge.sel{background:#1a237e;color:white;border-color:#1a237e}
/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:white;border-radius:14px;width:96%;max-width:820px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.modal-head{padding:14px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal-head h2{font-size:14px;font-weight:700;color:#1a237e;flex:1;white-space:nowrap}
.modal-search{flex:1 1 180px;padding:7px 11px;border:1px solid #c5cae9;border-radius:8px;font-size:13px;font-family:inherit;min-width:140px}
.modal-search:focus{outline:none;border-color:#1a237e}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#888;padding:0 4px;line-height:1}
.modal-body{display:flex;flex:1;overflow:hidden;min-height:0}
.cat-sidebar{width:150px;min-width:110px;border-right:1px solid #eee;overflow-y:auto;padding:6px 0;flex-shrink:0}
.cat-item{padding:7px 12px;font-size:12px;cursor:pointer;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid transparent;display:flex;justify-content:space-between;align-items:center}
.cat-item:hover{background:#f5f5f5}
.cat-item.sel{color:#1a237e;font-weight:700;border-left-color:#1a237e;background:#e8eaf6}
.cat-count{font-size:10px;color:#aaa;font-weight:400;margin-left:4px;flex-shrink:0}
.item-list{flex:1;overflow-y:auto;padding:8px}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:6px}
.item-card{border:1px solid #e8eaf6;border-radius:8px;padding:9px 10px;cursor:pointer;transition:all .15s;position:relative}
.item-card:hover{border-color:#1a237e;background:#f0f3ff}
.item-card.checked{border-color:#1a237e;background:#e8eaf6}
.ic-name{font-size:12px;font-weight:600;color:#1a237e;margin-bottom:2px;line-height:1.3;padding-right:18px}
.ic-spec{font-size:11px;color:#888;line-height:1.3;margin-bottom:3px}
.ic-price{font-size:12px;font-weight:700;color:#333}
.ic-unit{font-size:10px;color:#888;margin-left:3px}
.ic-chk{position:absolute;top:6px;right:7px;font-size:15px;color:#1a237e;font-weight:700}
.modal-foot{padding:11px 18px;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;gap:10px}
.sel-count{font-size:13px;color:#1a237e;font-weight:700}
.btn-add-sel{background:#1a237e;color:white;border:none;padding:8px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-add-sel:hover{opacity:.9}
.btn-cancel-modal{background:#f5f5f5;color:#555;border:1px solid #ddd;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
/* サジェスト */
.suggest-wrap{position:relative}
.sg-list{position:absolute;top:100%;left:0;right:0;background:white;border:1px solid #c5cae9;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.12);display:none}
.sg-list.show{display:block}
.sg-item{padding:6px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:6px}
.sg-item:hover{background:#e8eaf6}
.sg-name{font-weight:600;color:#1a237e;flex:1}
.sg-spec{color:#888;font-size:11px;white-space:nowrap;overflow:hidden;max-width:120px;text-overflow:ellipsis}
.sg-price{color:#333;font-weight:600;white-space:nowrap}
/* 明細テーブル */
.tbl-wrap{overflow-x:auto}
table.items{width:100%;border-collapse:collapse;min-width:680px}
table.items th{background:#e8eaf6;color:#1a237e;font-size:11px;font-weight:700;padding:8px 5px;text-align:center;white-space:nowrap}
table.items td{padding:3px 3px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
table.items td input{width:100%;padding:7px 5px;border:1px solid transparent;border-radius:5px;font-size:12px;text-align:center;background:transparent;font-family:inherit}
table.items td input:focus{border-color:#1a237e;background:white;outline:none}
table.items td.td-l input{text-align:left}
table.items td.td-amt{text-align:right;font-weight:600;font-size:12px;padding-right:6px;color:#333;white-space:nowrap}
table.items td.td-del{text-align:center;width:32px}
.del-btn{background:none;border:none;color:#e53935;font-size:15px;cursor:pointer;padding:2px 4px;border-radius:4px}
.del-btn:hover{background:#ffebee}
.row-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.add-btn{background:#e8eaf6;color:#1a237e;border:none;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.add-btn:hover{background:#c5cae9}
.open-modal-btn{background:#1a237e;color:white;border:none;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.open-modal-btn:hover{opacity:.9}
/* 計算 */
.misc-row{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.misc-row label{font-size:12px;font-weight:600;color:#555;white-space:nowrap}
.misc-row input[type=number]{width:76px;padding:6px 8px;border:1px solid #ddd;border-radius:7px;font-size:13px;text-align:right;font-family:inherit;background:#fafafa}
.misc-row input[type=number]:focus{outline:none;border-color:#1a237e}
.misc-row span{font-size:12px;color:#555}
.tax-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.tax-row label{font-size:12px;font-weight:600;color:#555}
.tax-row select{padding:6px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;font-family:inherit;background:#fafafa}
.totals{margin-top:16px;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.tr{display:flex;min-width:290px;justify-content:space-between;padding:5px 11px;border-radius:7px;align-items:center}
.tr .lbl{font-size:12px}
.tr .val{font-size:13px;font-weight:600;min-width:110px;text-align:right}
.tr.grand{background:#1a237e;color:white;margin-top:4px}
.tr.grand .lbl{font-size:13px;font-weight:700}
.tr.grand .val{font-size:15px;font-weight:700}
/* 出力ボタン */
.actions{display:flex;gap:10px;justify-content:center;margin-top:6px}
.btn-ex{background:linear-gradient(135deg,#1a237e,#283593);color:white;border:none;padding:12px 32px;font-size:15px;font-weight:700;border-radius:10px;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(26,35,126,.3)}
.btn-ex:hover{opacity:.9;transform:translateY(-1px)}
.btn-rst{background:#f5f5f5;color:#555;border:1px solid #ddd;padding:12px 20px;font-size:13px;font-weight:600;border-radius:10px;cursor:pointer;font-family:inherit}
.btn-rst:hover{background:#eee}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}.card{padding:14px}.modal{width:99%}.cat-sidebar{width:110px}}
</style>
</head>
<body>
<div class="header">
  <div><h1>📋 見積書作成ツール</h1><span>株式会社IGUMI　　見積りベース 206品目対応</span></div>
</div>
<div class="container">

<div class="card">
  <div class="card-title">基本情報</div>
  <div class="grid3">
    <div class="field"><label>見積番号</label><input type="text" id="estNo"/></div>
    <div class="field"><label>作成日</label><input type="date" id="issueDate"/></div>
    <div class="field"><label>有効期限</label><input type="text" id="validUntil"/></div>
  </div>
</div>

<div class="card">
  <div class="card-title">宛先</div>
  <div class="grid2">
    <div class="field"><label>会社名・宛先 <span class="req">*</span></label><input type="text" id="clientName" placeholder="例：○○管理株式会社"/></div>
    <div class="field"><label>担当者名</label><input type="text" id="clientContact" placeholder="例：山田 太郎 様"/></div>
  </div>
</div>

<div class="card">
  <div class="card-title">工事情報</div>
  <div class="grid2">
    <div class="field"><label>工事名 <span class="req">*</span></label><input type="text" id="workName" placeholder="例：給水管一部更新工事"/></div>
    <div class="field"><label>工事場所・物件名</label><input type="text" id="propName" placeholder="例：TMフラッツ 〇〇号室"/></div>
  </div>
  <div class="grid3" style="margin-top:12px">
    <div class="field"><label>着工日</label><input type="date" id="startDate"/></div>
    <div class="field"><label>完工日</label><input type="date" id="endDate"/></div>
    <div class="field"><label>取引方法</label><input type="text" id="payment"/></div>
  </div>
</div>

<div class="card">
  <div class="card-title">担当者</div>
  <div class="tanto-row" id="tantoWrap">
    <span style="font-size:11px;color:#888;">クリックで選択：</span>
  </div>
</div>

<div class="card">
  <div class="card-title">明細</div>
  <div class="tbl-wrap">
    <table class="items">
      <thead><tr>
        <th style="width:24%">品名・作業内容</th>
        <th style="width:20%">材質・寸法</th>
        <th style="width:8%">数量</th>
        <th style="width:7%">単位</th>
        <th style="width:12%">単価（円）</th>
        <th style="width:12%">金額（円）</th>
        <th style="width:13%">備考</th>
        <th style="width:4%"></th>
      </tr></thead>
      <tbody id="itemsBody"></tbody>
    </table>
  </div>
  <div class="row-btns">
    <button class="add-btn" onclick="addRow()">＋ 空行追加</button>
    <button class="open-modal-btn" onclick="openModal()">📦 品目一覧から追加</button>
  </div>
  <div class="misc-row">
    <label>諸経費：</label>
    <input type="number" id="miscRate" value="5" min="0" max="100" step="0.1" oninput="calcTotals()"/>
    <span>%（法定福利費含む）</span>
    <span style="margin-left:12px"></span>
    <label>値引き：</label>
    <input type="number" id="discount" value="0" min="0" oninput="calcTotals()"/>
    <span>円</span>
  </div>
  <div class="tax-row">
    <label>消費税率：</label>
    <select id="taxRate" onchange="calcTotals()">
      <option value="0.10">10%</option>
      <option value="0.08">8%（軽減税率）</option>
      <option value="0">非課税（0%）</option>
    </select>
  </div>
  <div class="totals">
    <div class="tr"><span class="lbl">明細小計</span><span class="val" id="d-sub">¥0</span></div>
    <div class="tr"><span class="lbl" id="d-misc-lbl">諸経費（5%）</span><span class="val" id="d-misc">¥0</span></div>
    <div class="tr"><span class="lbl">値引き</span><span class="val" id="d-disc">- ¥0</span></div>
    <div class="tr"><span class="lbl">小計</span><span class="val" id="d-ko">¥0</span></div>
    <div class="tr"><span class="lbl" id="d-tax-lbl">消費税（10%）</span><span class="val" id="d-tax">¥0</span></div>
    <div class="tr grand"><span class="lbl">合計金額（税込）</span><span class="val" id="d-total">¥0</span></div>
  </div>
</div>

<div class="card">
  <div class="card-title">備考</div>
  <div class="field"><textarea id="notes" rows="3" placeholder="例：上記金額にて対応可能です。"></textarea></div>
</div>

<div class="card">
  <div class="actions">
    <button class="btn-rst" onclick="resetForm()">🔄 リセット</button>
    <button class="btn-ex" onclick="genExcel()">📥 Excel出力</button>
  </div>
</div>

</div>

<!-- 品目選択モーダル -->
<div class="modal-bg" id="modalBg" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-head">
      <h2>📦 品目一覧（見積りベース全品目）</h2>
      <input class="modal-search" type="text" id="modalSearch" placeholder="名称・材質で検索..." oninput="filterModal()"/>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="cat-sidebar" id="catSidebar"></div>
      <div class="item-list" id="itemList"></div>
    </div>
    <div class="modal-foot">
      <span class="sel-count" id="selCount">0件 選択中</span>
      <div style="display:flex;gap:8px">
        <button class="btn-cancel-modal" onclick="closeModal()">キャンセル</button>
        <button class="btn-add-sel" onclick="addSelected()">選択した品目を追加</button>
      </div>
    </div>
  </div>
</div>

// 初期化
window.onload = () => {
  const t = new Date(), y = t.getFullYear(), m = String(t.getMonth()+1).padStart(2,'0'), d = String(t.getDate()).padStart(2,'0');
  document.getElementById('issueDate').value = `${y}-${m}-${d}`;
  document.getElementById('estNo').value = `EST-${y}${m}${d}-001`;
  document.getElementById('validUntil').value = '発行日より60日以内';
  document.getElementById('payment').value = '定時御支払';
  addRow(); addRow(); addRow();
};

// 行追加
let rowId = 0;
function addRow(it = null) {
  const tbody = document.getElementById('itemsBody');
  const id = rowId++;
  const tr = document.createElement('tr');
  tr.id = `row-${id}`;
  const n = it ? esc(it.n) : '';
  const s = it ? esc(it.s) : '';
  const q = it ? it.q : '';
  const u = it ? esc(it.u) : '';
  const p = (it && it.p) ? it.p : '';
  const nt = it ? esc(it.note||'') : '';
  const amt = (it && it.p && it.q) ? '¥' + (it.p * it.q).toLocaleString('ja-JP') : '¥0';
  tr.innerHTML = `
    <td class="td-l"><div class="suggest-wrap">
      <input type="text" placeholder="品名を入力または検索" value="${n}"
        oninput="onSg(this,${id})" onblur="hideSg(${id})" autocomplete="off"/>
      <div class="sg-list" id="sg-${id}"></div>
    </div></td>
    <td class="td-l"><input type="text" placeholder="材質・寸法" value="${s}"/></td>
    <td><input type="number" placeholder="1" min="0" step="0.01" style="text-align:right" value="${q}" oninput="calcTotals()"/></td>
    <td><input type="text" placeholder="式" value="${u}"/></td>
    <td><input type="number" placeholder="0" min="0" step="1" style="text-align:right" value="${p}" oninput="calcTotals()"/></td>
    <td class="td-amt">${amt}</td>
    <td class="td-l"><input type="text" placeholder="備考" value="${nt}"/></td>
    <td class="td-del"><button class="del-btn" onclick="delRow(${id})">×</button></td>`;
  tbody.appendChild(tr);
  calcTotals();
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function delRow(id) { const r = document.getElementById(`row-${id}`); if(r) r.remove(); calcTotals(); }

// サジェスト
function onSg(el, id) {
  const q = el.value.trim();
  const sl = document.getElementById(`sg-${id}`);
  if (!q) { sl.classList.remove('show'); return; }
  const res = ITEMS.filter(it => it.n.includes(q) || it.s.includes(q)).slice(0, 10);
  if (!res.length) { sl.classList.remove('show'); return; }
  sl.innerHTML = res.map(it => {
    const idx = ITEMS.indexOf(it);
    return `<div class="sg-item" onmousedown="fillSg(event,${id},${idx})">
      <span class="sg-name">${it.n}</span>
      <span class="sg-spec">${it.s||''}</span>
      <span class="sg-price">${it.p ? '¥'+it.p.toLocaleString() : ''}</span>
    </div>`;
  }).join('');
  sl.classList.add('show');
}
function hideSg(id) { setTimeout(() => { const s = document.getElementById(`sg-${id}`); if(s) s.classList.remove('show'); }, 150); }
function fillSg(e, id, idx) {
  e.preventDefault();
  const it = ITEMS[idx];
  const tr = document.getElementById(`row-${id}`);
  const ins = tr.querySelectorAll('input');
  ins[0].value = it.n; ins[1].value = it.s||'';
  ins[2].value = it.q||1; ins[3].value = it.u||'式';
  ins[4].value = it.p||''; ins[6].value = it.note||'';
  document.getElementById(`sg-${id}`).classList.remove('show');
  calcTotals();
}

// 計算
function getN(el) { return parseFloat(el.value) || 0; }
function fmtY(n) { return '¥' + Math.round(n).toLocaleString('ja-JP'); }
function calcTotals() {
  let sub = 0;
  document.querySelectorAll('#itemsBody tr').forEach(tr => {
    const ins = tr.querySelectorAll('input[type=number]');
    if (ins.length < 2) return;
    const amt = getN(ins[0]) * getN(ins[1]); sub += amt;
    tr.querySelector('.td-amt').textContent = fmtY(amt);
  });
  const mr = getN(document.getElementById('miscRate')) / 100;
  const misc = Math.round(sub * mr);
  const disc = getN(document.getElementById('discount'));
  const ko = sub + misc - disc;
  const tr2 = parseFloat(document.getElementById('taxRate').value);
  const tax = Math.round(ko * tr2);
  const total = ko + tax;
  const mrPct = Math.round(getN(document.getElementById('miscRate')));
  const tStr = tr2===0.10 ? '10%' : tr2===0.08 ? '8%' : '0%';
  document.getElementById('d-sub').textContent = fmtY(sub);
  document.getElementById('d-misc-lbl').textContent = `諸経費（${mrPct}%）`;
  document.getElementById('d-misc').textContent = fmtY(misc);
  document.getElementById('d-disc').textContent = `- ${fmtY(disc)}`;
  document.getElementById('d-ko').textContent = fmtY(ko);
  document.getElementById('d-tax-lbl').textContent = `消費税（${tStr}）`;
  document.getElementById('d-tax').textContent = fmtY(tax);
  document.getElementById('d-total').textContent = fmtY(total);
}

  selItems = new Set();
  document.getElementById('modalSearch').value = '';
  currentCat = 'すべて';
  buildSidebar();
  renderItems(ITEMS);
  document.getElementById('modalBg').classList.add('show');
  updateSelCount();
}
function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
function bgClick(e) { if (e.target === document.getElementById('modalBg')) closeModal(); }

function buildSidebar() {
  const sb = document.getElementById('catSidebar');
  const availCats = CAT_ORDER.filter(c => ITEMS.some(it => it.cat === c));
  const cats = ['すべて', ...availCats];
  sb.innerHTML = cats.map(c => {
    const cnt = c === 'すべて' ? ITEMS.length : ITEMS.filter(it => it.cat === c).length;
    return `<div class="cat-item${c===currentCat?' sel':''}" onclick="selectCat(${JSON.stringify(c)})">
      <span style="overflow:hidden;text-overflow:ellipsis">${c}</span>
      <span class="cat-count">${cnt}</span>
    </div>`;
  }).join('');
}

function selectCat(cat) {
  currentCat = cat;
  buildSidebar();
  filterModal();
}

function filterModal() {
  const q = document.getElementById('modalSearch').value.trim();
  let list = currentCat === 'すべて' ? ITEMS : ITEMS.filter(it => it.cat === currentCat);
  if (q) list = list.filter(it => it.n.includes(q) || (it.s||'').includes(q));
  renderItems(list);
}

function renderItems(list) {
  const el = document.getElementById('itemList');
  if (!list.length) {
    el.innerHTML = '<div style="padding:24px;color:#aaa;text-align:center;">該当する品目がありません</div>';
    return;
  }
  el.innerHTML = '<div class="item-grid">' + list.map(it => {
    const key = it.n + '__' + (it.s||'');
    const checked = selItems.has(key);
    const idx = ITEMS.indexOf(it);
    return `<div class="item-card${checked?' checked':''}" onclick="toggleItem(${idx},this)">
      ${checked ? '<span class="ic-chk">✓</span>' : ''}
      <div class="ic-name">${it.n}</div>
      ${it.s ? `<div class="ic-spec">${it.s}</div>` : ''}
      <div><span class="ic-price">${it.p ? '¥'+it.p.toLocaleString() : '単価未設定'}</span>
      <span class="ic-unit">${it.u ? '/ '+it.u : ''}</span></div>
    </div>`;
  }).join('') + '</div>';
}

function toggleItem(idx, el) {
  const it = ITEMS[idx];
  const key = it.n + '__' + (it.s||'');
  if (selItems.has(key)) {
    selItems.delete(key);
    el.classList.remove('checked');
    el.querySelector('.ic-chk')?.remove();
  } else {
    selItems.add(key);
    el.classList.add('checked');
    const chk = document.createElement('span');
    chk.className = 'ic-chk'; chk.textContent = '✓';
    el.prepend(chk);
  }
  updateSelCount();
}
function updateSelCount() { document.getElementById('selCount').textContent = `${selItems.size}件 選択中`; }

function addSelected() {
  if (!selItems.size) { alert('品目を選択してください'); return; }
  ITEMS.forEach(it => {
    const key = it.n + '__' + (it.s||'');
    if (selItems.has(key)) addRow(it);
  });
  closeModal();
}

// リセット
function resetForm() {
  if (!confirm('入力内容をリセットしますか？')) return;
  rowId = 0;
  document.getElementById('itemsBody').innerHTML = '';
  selTanto = '';
  document.querySelectorAll('.tanto-badge').forEach(b => b.classList.remove('sel'));
  window.onload();
}
