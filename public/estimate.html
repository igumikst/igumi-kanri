<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>見積書作成 - 株式会社IGUMI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f0f2f5;color:#333;min-height:100vh;font-size:16px}

.header{background:linear-gradient(135deg,#1a237e,#283593);color:white;padding:14px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.3);position:sticky;top:0;z-index:50}
.header h1{font-size:18px;font-weight:700}
.header span{font-size:11px;opacity:.75}

/* PC 2カラム */
.page-body{display:flex;min-height:calc(100vh - 52px)}
.left-col{width:200px;min-width:160px;background:white;border-right:1px solid #e0e0e0;padding:14px 0;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.main-col{flex:1;padding:20px 20px;overflow-y:auto;max-width:780px}
.nav-section{padding:0 12px 5px;font-size:10px;font-weight:700;color:#aaa;letter-spacing:.08em;margin-top:10px}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;cursor:pointer;color:#555;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:#f5f5f5;color:#1a237e}
.nav-item.active{background:#e8eaf6;color:#1a237e;font-weight:700;border-left-color:#1a237e}
.nav-dot{width:6px;height:6px;border-radius:50%;background:#c5cae9;flex-shrink:0}
.nav-item.active .nav-dot{background:#1a237e}

/* カード */
.card{background:white;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-title{font-size:14px;font-weight:700;color:#1a237e;border-left:4px solid #1a237e;padding-left:10px;margin-bottom:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.field{margin-bottom:4px}
.field label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;background:#fafafa;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field textarea:focus{outline:none;border-color:#1a237e;background:white}
.field textarea{resize:vertical;min-height:70px}
.req{color:#e53935}

/* 担当者 */
.tanto-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tanto-badge{display:inline-block;padding:8px 18px;border-radius:24px;border:2px solid #c5cae9;font-size:14px;font-weight:600;cursor:pointer;color:#1a237e;background:white;transition:all .15s;user-select:none}
.tanto-badge.sel{background:#1a237e;color:white;border-color:#1a237e}

/* ===== 内訳エディタ ===== */
.meisai-area{display:flex;flex-direction:column;gap:12px}

/* 大項目ブロック */
.pg-block{border:2px solid #e8eaf6;border-radius:12px;overflow:hidden;background:white}

/* 大項目ヘッダー */
.pg-head-wrap{display:flex;align-items:stretch;background:#e8eaf6}
.pg-head{display:flex;align-items:center;gap:8px;padding:14px 16px;cursor:pointer;user-select:none;min-height:54px;flex:1}
.pg-toggle{font-size:16px;color:#1a237e;width:22px;text-align:center;transition:transform .2s;flex-shrink:0}
.pg-toggle.closed{transform:rotate(-90deg)}
.pg-name{flex:1;font-size:15px;font-weight:700;color:#1a237e;border:none;background:transparent;font-family:inherit;min-width:0;padding:4px 6px;border-radius:6px}
.pg-name:focus{outline:none;background:white;border:1.5px solid #c5cae9}
.pg-subtotal{font-size:14px;font-weight:700;color:#1a237e;white-space:nowrap;min-width:80px;text-align:right;flex-shrink:0}
.pg-del{background:none;border:none;color:#e53935;font-size:22px;cursor:pointer;padding:0 16px;line-height:1;flex-shrink:0;display:flex;align-items:center;border-left:1px solid #c5cae9;min-width:52px;justify-content:center}
.pg-del:active{background:#ffebee}

/* 大項目サブ情報（材質・数量） */
.pg-sub-info{padding:8px 14px;background:#f0f3ff;border-bottom:1px solid #e0e4f8}
.pg-sub-info-row{display:flex;gap:8px;align-items:flex-end}
.pg-info-field{display:flex;flex-direction:column;gap:3px;flex:2}
.pg-info-field label{font-size:10px;font-weight:600;color:#7986cb}
.pg-info-field input{padding:7px 10px;border:1.5px solid #c5cae9;border-radius:8px;font-size:14px;font-family:inherit;background:white;-webkit-appearance:none}
.pg-info-field input:focus{outline:none;border-color:#1a237e}
.pg-info-num{flex:1}
.pg-info-unit{flex:0.8}

/* 細項目リスト */
.pg-body{padding:10px 12px 14px}

/* 細項目カード（スマホ対応） */
.sub-card{background:#f8f9ff;border:1.5px solid #e8eaf6;border-radius:10px;padding:12px 14px;margin-bottom:8px;position:relative}
.sub-card-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.sub-card-row:last-child{margin-bottom:0}
.sub-field{display:flex;flex-direction:column;gap:4px;flex:1}
.sub-field label{font-size:11px;font-weight:600;color:#888}
.sub-field input{width:100%;padding:9px 11px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;background:white;-webkit-appearance:none}
.sub-field input:focus{outline:none;border-color:#1a237e}
.sub-field input[type=number]{text-align:right}
.sub-amt-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px;padding-top:8px;border-top:1px solid #e8eaf6}
.sub-amt-label{font-size:12px;color:#888}
.sub-amt-val{font-size:16px;font-weight:700;color:#1a237e}
.sub-card-del{position:absolute;top:8px;right:8px;background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1}
.sub-card-del:hover{color:#e53935;background:#ffebee}

/* 細項目追加ボタン */
.sub-add-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.sub-add-btn{flex:1;min-width:140px;background:white;color:#555;border:1.5px solid #ddd;padding:12px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center}
.sub-add-btn:active{background:#f5f5f5}
.sub-pick-btn{flex:1;min-width:140px;background:#1a237e;color:white;border:none;padding:12px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center}
.sub-pick-btn:active{opacity:.85}

/* 大項目追加 */
.pg-add-area{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.pg-add-btn{background:white;color:#1a237e;border:2px dashed #c5cae9;padding:16px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;text-align:center}
.pg-add-btn:active{background:#f0f3ff}
.pg-pick-btn{background:#1a237e;color:white;border:none;padding:16px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;text-align:center}
.pg-pick-btn:active{opacity:.85}

/* 計算 */
.calc-area{margin-top:20px;padding-top:16px;border-top:2px solid #e8eaf6}
.misc-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.misc-row label{font-size:14px;font-weight:600;color:#555;white-space:nowrap}
.misc-row input[type=number]{width:80px;padding:10px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;text-align:right;font-family:inherit;background:#fafafa;-webkit-appearance:none}
.misc-row input[type=number]:focus{outline:none;border-color:#1a237e}
.misc-row span{font-size:14px;color:#555}
.tax-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.tax-row label{font-size:14px;font-weight:600;color:#555}
.tax-row select{padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;background:#fafafa;-webkit-appearance:none;flex:1;max-width:200px}
.total-area{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.tr{display:flex;min-width:260px;justify-content:space-between;padding:6px 14px;border-radius:8px;align-items:center}
.tr .lbl{font-size:13px;color:#555}
.tr .val{font-size:14px;font-weight:600;min-width:110px;text-align:right;color:#333}
.tr.grand{background:#1a237e;color:white;margin-top:6px}
.tr.grand .lbl{font-size:14px;font-weight:700;color:white}
.tr.grand .val{font-size:16px;font-weight:700;color:white}

/* 出力ボタン */
.actions{display:flex;flex-direction:column;gap:10px}
.btn-ex{background:linear-gradient(135deg,#1a237e,#283593);color:white;border:none;padding:16px;font-size:16px;font-weight:700;border-radius:12px;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(26,35,126,.3);width:100%;text-align:center}
.btn-ex:active{opacity:.9}
.btn-rst{background:#f5f5f5;color:#555;border:1.5px solid #ddd;padding:14px;font-size:15px;font-weight:600;border-radius:12px;cursor:pointer;font-family:inherit;width:100%;text-align:center}
.btn-rst:active{background:#eee}

/* ===== モーダル（スマホ対応：縦1カラム） ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:white;border-radius:20px 20px 0 0;width:100%;max-width:620px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 -4px 24px rgba(0,0,0,.2)}
.modal-head{padding:16px 20px 12px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px;flex-shrink:0}
.modal-head h2{font-size:16px;font-weight:700;color:#1a237e;flex:1}
.modal-close{background:none;border:none;font-size:26px;cursor:pointer;color:#888;line-height:1;padding:0 4px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-foot{padding:14px 20px;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;padding-bottom:max(14px,env(safe-area-inset-bottom))}
.sel-count{font-size:14px;color:#1a237e;font-weight:700}
.btn-add-sel{background:#1a237e;color:white;border:none;padding:13px 24px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;flex:1}
.btn-add-sel:active{opacity:.9}
.btn-cancel{background:#f5f5f5;color:#555;border:1.5px solid #ddd;padding:13px 20px;border-radius:10px;font-size:15px;cursor:pointer;font-family:inherit}

/* 大項目モーダル：ボタングリッド */
.pg-modal-grid{display:flex;flex-direction:column;gap:2px;padding:8px}
.pg-modal-item{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-radius:10px;background:white;border:1.5px solid #e8eaf6;cursor:pointer;font-size:15px;font-weight:600;color:#1a237e;transition:all .12s}
.pg-modal-item:active{background:#e8eaf6}
.pg-modal-cnt{font-size:12px;color:#aaa;font-weight:400}

/* 細項目モーダル：大項目アコーディオン */
.acc-pg{border-bottom:1px solid #eee}
.acc-pg-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;background:white;user-select:none}
.acc-pg-name{font-size:15px;font-weight:700;color:#1a237e;flex:1}
.acc-pg-cnt{font-size:12px;color:#aaa;margin-right:8px}
.acc-pg-arr{font-size:14px;color:#aaa;transition:transform .2s;flex-shrink:0}
.acc-pg-arr.open{transform:rotate(90deg)}
.acc-pg-body{display:none;background:#f8f9ff;padding:8px}
.acc-pg-body.open{display:block}

/* 検索バー */
.modal-search{width:100%;padding:12px 16px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;background:#fafafa;-webkit-appearance:none;margin-bottom:2px}
.modal-search:focus{outline:none;border-color:#1a237e}
.search-wrap{padding:12px 12px 4px}

/* 細項目カード（モーダル内） */
.m-item{display:flex;align-items:center;gap:10px;padding:13px 14px;border:1.5px solid #eee;border-radius:10px;cursor:pointer;background:white;margin-bottom:6px;transition:all .12s}
.m-item:active{background:#f0f3ff}
.m-item.checked{border-color:#1a237e;background:#e8eaf6}
.m-chk{width:22px;height:22px;border:2px solid #c5cae9;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#1a237e;font-weight:700;transition:all .12s}
.m-item.checked .m-chk{background:#1a237e;border-color:#1a237e;color:white}
.m-info{flex:1;min-width:0}
.m-name{font-size:14px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-item.checked .m-name{color:#1a237e}
.m-spec{font-size:12px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-price{font-size:14px;font-weight:700;color:#333;white-space:nowrap;text-align:right;flex-shrink:0}
.m-unit{font-size:11px;color:#888;display:block;text-align:right}

/* サジェスト（スマホ用大き目） */
.sg-wrap{position:relative}
.sg-list{position:absolute;top:100%;left:0;right:0;background:white;border:1.5px solid #c5cae9;border-radius:0 0 10px 10px;max-height:220px;overflow-y:auto;z-index:200;box-shadow:0 6px 16px rgba(0,0,0,.15);display:none}
.sg-list.show{display:block}
.sg-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;min-height:50px}
.sg-item:active{background:#e8eaf6}
.sg-name{font-weight:600;color:#1a237e;flex:1;font-size:14px}
.sg-spec{color:#888;font-size:12px;white-space:nowrap;overflow:hidden;max-width:80px;text-overflow:ellipsis;flex-shrink:0}
.sg-price{color:#333;font-weight:700;white-space:nowrap;font-size:13px;flex-shrink:0}

/* PC専用調整 */
@media(min-width:721px){
  .modal-bg{align-items:center}
  .modal{border-radius:16px;max-width:680px;max-height:88vh}
  .pg-modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:12px}
  .actions{flex-direction:row;justify-content:center}
  .btn-ex{width:auto;padding:14px 36px}
  .btn-rst{width:auto;padding:14px 24px}
  .pg-add-area{flex-direction:row}
  .pg-add-btn,.pg-pick-btn{width:auto;flex:1}
}

/* スマホ専用 */
@media(max-width:720px){
  .page-body{flex-direction:column}
  .left-col{display:none}
  .main-col{padding:12px}
  .grid2,.grid3{grid-template-columns:1fr}
  .card{padding:16px}
}
</style>
</head>
<body>
<div class="header">
  <div><h1>📋 見積書作成</h1><span>株式会社IGUMI</span></div>
</div>
<div class="page-body">

<!-- 左ナビ（PCのみ） -->
<div class="left-col">
  <div class="nav-section">セクション</div>
  <div class="nav-item active" onclick="goTo('s-basic')"><span class="nav-dot"></span>基本情報</div>
  <div class="nav-item" onclick="goTo('s-client')"><span class="nav-dot"></span>宛先</div>
  <div class="nav-item" onclick="goTo('s-work')"><span class="nav-dot"></span>工事情報</div>
  <div class="nav-item" onclick="goTo('s-tanto')"><span class="nav-dot"></span>担当者</div>
  <div class="nav-item" onclick="goTo('s-meisai')"><span class="nav-dot"></span>内訳明細</div>
  <div class="nav-item" onclick="goTo('s-notes')"><span class="nav-dot"></span>備考</div>
  <div class="nav-item" onclick="goTo('s-out')"><span class="nav-dot"></span>出力</div>
</div>

<div class="main-col">

<div class="card" id="s-basic">
  <div class="card-title">基本情報</div>
  <div class="grid3">
    <div class="field"><label>見積番号</label><input type="text" id="estNo"/></div>
    <div class="field"><label>作成日</label><input type="date" id="issueDate"/></div>
    <div class="field"><label>有効期限</label><input type="text" id="validUntil"/></div>
  </div>
</div>

<div class="card" id="s-client">
  <div class="card-title">宛先</div>
  <div class="grid2">
    <div class="field"><label>会社名・宛先 <span class="req">*</span></label><input type="text" id="clientName" placeholder="例：○○管理株式会社"/></div>
    <div class="field"><label>担当者名</label><input type="text" id="clientContact" placeholder="例：山田 太郎 様"/></div>
  </div>
</div>

<div class="card" id="s-work">
  <div class="card-title">工事情報</div>
  <div class="grid2">
    <div class="field"><label>工事名 <span class="req">*</span></label><input type="text" id="workName" placeholder="例：給水管一部更新工事"/></div>
    <div class="field"><label>工事場所・物件名</label><input type="text" id="propName" placeholder="例：TMフラッツ 〇〇号室"/></div>
  </div>
  <div class="grid3" style="margin-top:12px">
    <div class="field"><label>着工日</label><input type="date" id="startDate"/></div>
    <div class="field"><label>完工日</label><input type="date" id="endDate"/></div>
    <div class="field"><label>取引方法</label><input type="text" id="payment"/></div>
  </div>
</div>

<div class="card" id="s-tanto">
  <div class="card-title">担当者</div>
  <div class="tanto-row" id="tantoWrap">
    <span style="font-size:13px;color:#888;">クリックで選択：</span>
  </div>
</div>

<div class="card" id="s-meisai">
  <div class="card-title">内訳明細</div>
  <div class="meisai-area" id="meisaiArea"></div>
  <div class="pg-add-area">
    <button class="pg-add-btn" onclick="addPg()">＋ 大項目を追加（手書き）</button>
    <button class="pg-pick-btn" onclick="openPgModal()">📦 見積りベースから選択</button>
  </div>
  <div class="calc-area">
    <div class="misc-row">
      <label>諸経費：</label>
      <input type="number" id="miscRate" value="5" min="0" max="100" step="0.1" oninput="calcAll()"/>
      <span>%（法定福利費含む）</span>
    </div>
    <div class="misc-row">
      <label>値引き：</label>
      <input type="number" id="discount" value="0" min="0" oninput="calcAll()"/>
      <span>円</span>
    </div>
    <div class="tax-row">
      <label>消費税率：</label>
      <select id="taxRate" onchange="calcAll()">
        <option value="0.10">10%</option>
        <option value="0.08">8%（軽減税率）</option>
        <option value="0">非課税（0%）</option>
      </select>
    </div>
    <div class="total-area">
      <div class="tr"><span class="lbl">明細小計</span><span class="val" id="d-sub">¥0</span></div>
      <div class="tr"><span class="lbl" id="d-misc-lbl">諸経費（5%）</span><span class="val" id="d-misc">¥0</span></div>
      <div class="tr"><span class="lbl">値引き</span><span class="val" id="d-disc">- ¥0</span></div>
      <div class="tr"><span class="lbl">小計</span><span class="val" id="d-ko">¥0</span></div>
      <div class="tr"><span class="lbl" id="d-tax-lbl">消費税（10%）</span><span class="val" id="d-tax">¥0</span></div>
      <div class="tr grand"><span class="lbl">合計金額（税込）</span><span class="val" id="d-total">¥0</span></div>
    </div>
  </div>
</div>

<div class="card" id="s-notes">
  <div class="card-title">備考</div>
  <div class="field"><textarea id="notes" rows="3" placeholder="例：上記金額にて対応可能です。"></textarea></div>
</div>

<div class="card" id="s-out">
  <div class="actions">
    <button class="btn-rst" onclick="resetForm()">🔄 リセット</button>
    <button class="btn-ex" onclick="genExcel()">📥 Excel出力（表紙＋内訳明細）</button>
  </div>
</div>

</div></div>

<!-- 大項目選択モーダル -->
<div class="modal-bg" id="pgModalBg" onclick="if(event.target===this)closePgModal()">
  <div class="modal">
    <div class="modal-head">
      <h2>📦 大項目を選択</h2>
      <button class="modal-close" onclick="closePgModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="pg-modal-grid" id="pgModalList"></div>
    </div>
    <div class="modal-foot">
      <span></span>
      <button class="btn-cancel" onclick="closePgModal()">閉じる</button>
    </div>
  </div>
</div>

// ===== 大項目 =====
let pgId=0;
function addPg(name=''){
  const id=pgId++;
  const area=document.getElementById('meisaiArea');
  const block=document.createElement('div');
  block.className='pg-block';block.id=`pg-${id}`;
  block.innerHTML=`
    <div class="pg-head-wrap">
      <div class="pg-head" id="pghead-${id}">
        <span class="pg-toggle" id="tgl-${id}">▼</span>
        <input class="pg-name" type="text" value="${esc(name)}" placeholder="大項目名を入力" oninput="calcAll()"/>
        <span class="pg-subtotal" id="pgsub-${id}">¥0</span>
      </div>
      <button class="pg-del" id="pgdel-${id}">×</button>
    </div>
    <div class="pg-collapsible" id="pgcol-${id}">
      <div class="pg-sub-info">
        <div class="pg-sub-info-row">
          <div class="pg-info-field">
            <label>材質・寸法</label>
            <input type="text" placeholder="例：25mm HIVPパイプ"/>
          </div>
          <div class="pg-info-field pg-info-num">
            <label>数量</label>
            <input type="number" min="0" step="0.01" placeholder="1" style="text-align:right"/>
          </div>
          <div class="pg-info-field pg-info-unit">
            <label>単位</label>
            <input type="text" placeholder="式"/>
          </div>
        </div>
      </div>
      <div class="pg-body" id="pgbody-${id}">
        <div class="sub-cards" id="subcards-${id}"></div>
        <div class="sub-add-row">
          <button class="sub-add-btn" onclick="addSub(${id})">＋ 手書きで追加</button>
          <button class="sub-pick-btn" onclick="openSubModal(${id})">📦 一覧から選択</button>
        </div>
      </div>
    </div>`;
  area.appendChild(block);
  // トグル（pg-head クリックで開閉）
  document.getElementById(`pghead-${id}`).addEventListener('click', e=>{
    if(e.target.classList.contains('pg-name'))return;
    const col=document.getElementById(`pgcol-${id}`);
    const tgl=document.getElementById(`tgl-${id}`);
    const isOpen=col.style.display!=='none';
    col.style.display=isOpen?'none':'block';
    tgl.classList.toggle('closed',isOpen);
  });
  // 削除ボタン（独立してるので競合なし）
  document.getElementById(`pgdel-${id}`).addEventListener('click', ()=>{
    if(!confirm('この大項目を削除しますか？'))return;
    block.remove();calcAll();
  });
  calcAll();
  // スクロール
  setTimeout(()=>block.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

function delPg(e, id){
  e.stopPropagation();
  if(!confirm('この大項目を削除しますか？'))return;
  document.getElementById(`pg-${id}`)?.remove();calcAll();
}

// ===== 細項目カード =====
let subId=0;
function addSub(pgid, it=null){
  const cards=document.getElementById(`subcards-${pgid}`);if(!cards)return;
  const sid=subId++;
  const n=it?esc(it.n):'',s=it?esc(it.s||''):'';
  const q=it?it.q:1,u=it?esc(it.u||'式'):'式',p=it&&it.p?it.p:'',nt=it?esc(it.note||''):'';
  const amt=(it&&it.p&&it.q)?(it.p*it.q):0;
  const card=document.createElement('div');
  card.className='sub-card';card.id=`sc-${sid}`;
  card.innerHTML=`
    <button class="sub-card-del" onclick="document.getElementById('sc-${sid}').remove();calcAll()">×</button>
    <div class="sub-card-row">
      <div class="sub-field" style="flex:2">
        <label>名称</label>
        <div class="sg-wrap">
          <input type="text" value="${n}" placeholder="品名を入力または検索"
            oninput="onSg(this,${sid})" onblur="hideSg(${sid})" autocomplete="off"/>
          <div class="sg-list" id="sg-${sid}"></div>
        </div>
      </div>
      <div class="sub-field" style="flex:1.5">
        <label>材質・寸法</label>
        <input type="text" value="${s}" placeholder="例：25mm HIVPパイプ"/>
      </div>
    </div>
    <div class="sub-card-row">
      <div class="sub-field">
        <label>数量</label>
        <input type="number" value="${q}" min="0" step="0.01" oninput="calcCard(${sid})"/>
      </div>
      <div class="sub-field">
        <label>単位</label>
        <input type="text" value="${u}" placeholder="式"/>
      </div>
      <div class="sub-field">
        <label>単価（円）</label>
        <input type="number" value="${p}" min="0" step="1" placeholder="0" oninput="calcCard(${sid})"/>
      </div>
    </div>
    <div class="sub-field" style="margin-bottom:8px">
      <label>備考</label>
      <input type="text" value="${nt}" placeholder="備考（任意）"/>
    </div>
    <div class="sub-amt-row">
      <span class="sub-amt-label">金額</span>
      <span class="sub-amt-val" id="samt-${sid}">${amt?'¥'+amt.toLocaleString('ja-JP'):'¥0'}</span>
    </div>`;
  cards.appendChild(card);
  calcAll();
  setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function calcCard(sid){
  const card=document.getElementById(`sc-${sid}`);if(!card)return;
  const nums=card.querySelectorAll('input[type=number]');
  const qty=parseFloat(nums[0]?.value)||0,price=parseFloat(nums[1]?.value)||0;
  const amt=qty*price;
  const el=document.getElementById(`samt-${sid}`);
  if(el)el.textContent='¥'+Math.round(amt).toLocaleString('ja-JP');
  calcAll();
}

// サジェスト
function onSg(el,sid){
  const q=el.value.trim();const sl=document.getElementById(`sg-${sid}`);
  if(!q){sl.classList.remove('show');return;}
  const res=ALL_ITEMS.filter(it=>it.n.includes(q)||(it.s||'').includes(q)).slice(0,8);
  if(!res.length){sl.classList.remove('show');return;}
  sl.innerHTML=res.map(it=>`
    <div class="sg-item" onmousedown="fillSg(event,${sid},${ALL_ITEMS.indexOf(it)})">
      <span class="sg-name">${it.n}</span>
      <span class="sg-spec">${it.s||''}</span>
      <span class="sg-price">${it.p?'¥'+it.p.toLocaleString():''}</span>
    </div>`).join('');
  sl.classList.add('show');
}
function hideSg(sid){setTimeout(()=>{const s=document.getElementById(`sg-${sid}`);if(s)s.classList.remove('show');},200);}
function fillSg(e,sid,idx){
  e.preventDefault();const it=ALL_ITEMS[idx];
  const card=document.getElementById(`sc-${sid}`);if(!card)return;
  const txts=card.querySelectorAll('input[type=text]');
  const nums=card.querySelectorAll('input[type=number]');
  txts[0].value=it.n;txts[1].value=it.s||'';txts[2].value=it.u||'式';txts[3].value=it.note||'';
  nums[0].value=it.q||1;nums[1].value=it.p||'';
  document.getElementById(`sg-${sid}`).classList.remove('show');
  calcCard(sid);
}

// 計算
function getN(el){return parseFloat(el?.value)||0;}
function fmtY(n){return'¥'+Math.round(n).toLocaleString('ja-JP');}
function calcAll(){
  let total=0;
  document.querySelectorAll('.pg-block').forEach(block=>{
    const id=block.id.replace('pg-','');
    let pgSum=0;
    block.querySelectorAll('.sub-card').forEach(card=>{
      const nums=card.querySelectorAll('input[type=number]');
      const qty=getN(nums[0]),price=getN(nums[1]),amt=qty*price;
      pgSum+=amt;
      const sid=card.id.replace('sc-','');
      const el=document.getElementById(`samt-${sid}`);
      if(el)el.textContent=fmtY(amt);
    });
    total+=pgSum;
    const ps=document.getElementById(`pgsub-${id}`);
    if(ps)ps.textContent=fmtY(pgSum);
  });
  const mr=getN(document.getElementById('miscRate'))/100;
  const misc=Math.round(total*mr),disc=getN(document.getElementById('discount'));
  const ko=total+misc-disc,tr2=parseFloat(document.getElementById('taxRate').value);
  const tax=Math.round(ko*tr2),grand=ko+tax;
  const mrP=Math.round(getN(document.getElementById('miscRate')));
  const tS=tr2===0.10?'10%':tr2===0.08?'8%':'0%';
  document.getElementById('d-sub').textContent=fmtY(total);
  document.getElementById('d-misc-lbl').textContent=`諸経費（${mrP}%）`;
  document.getElementById('d-misc').textContent=fmtY(misc);
  document.getElementById('d-disc').textContent=`- ${fmtY(disc)}`;
  document.getElementById('d-ko').textContent=fmtY(ko);
  document.getElementById('d-tax-lbl').textContent=`消費税（${tS}）`;
  document.getElementById('d-tax').textContent=fmtY(tax);
  document.getElementById('d-total').textContent=fmtY(grand);
}

function openPgModal(){
  const pgList = document.getElementById('pgModalList');
  pgList.innerHTML = GROUPS.map((g,i) => `
    <div class="pg-modal-item" data-pgidx="${i}">
      <span>${g.parent}</span>
      <span class="pg-modal-cnt">${g.children.length}件</span>
    </div>`).join('');
  pgList.querySelectorAll('.pg-modal-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.pgidx);
      addPg(GROUPS[idx].parent);
      closePgModal();
    });
  });
  document.getElementById('pgModalBg').classList.add('show');
  document.body.style.overflow='hidden';
}
function closePgModal(){document.getElementById('pgModalBg').classList.remove('show');document.body.style.overflow='';}

}
function closeSubModal(){document.getElementById('subModalBg').classList.remove('show');document.body.style.overflow='';}

function buildAccordion(filteredGroups, openFirst=false){
  const acc=document.getElementById('subAccordion');
  acc.innerHTML=filteredGroups.map((g,gi)=>{
    const realIdx=GROUPS.indexOf(g);
    const isOpen=openFirst&&gi===0;
    return `<div class="acc-pg">
      <div class="acc-pg-head" data-accgi="${gi}">
        <span class="acc-pg-name">${g.parent}</span>
        <span class="acc-pg-cnt">${g.children.length}件</span>
        <span class="acc-pg-arr${isOpen?' open':''}">▶</span>
      </div>
      <div class="acc-pg-body${isOpen?' open':''}">
        ${g.children.map((it,ci)=>{
          const key=`${realIdx}__${ci}`;
          const chk=subSelSet.has(key);
          return `<div class="m-item${chk?' checked':''}" data-key="${key}">
            <div class="m-chk">${chk?'✓':''}</div>
            <div class="m-info">
              <div class="m-name">${it.n}</div>
              ${it.s?`<div class="m-spec">${it.s}</div>`:''}
            </div>
            <div>
              <span class="m-price">${it.p?'¥'+it.p.toLocaleString():'未設定'}</span>
              <span class="m-unit">${it.u?'/ '+it.u:''}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  // アコーディオン開閉イベント
  acc.querySelectorAll('.acc-pg-head').forEach(head => {
    head.addEventListener('click', () => toggleAcc(head));
  });
  // 品目チェックイベント
  acc.querySelectorAll('.m-item').forEach(el => {
    el.addEventListener('click', () => toggleSubItem(el.dataset.key, el));
  });
}

function toggleAcc(head){
  const body=head.nextElementSibling;
  const arr=head.querySelector('.acc-pg-arr');
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  arr.classList.toggle('open',!isOpen);
}

function filterSubModal(){
  const q=document.getElementById('subSearch').value.trim();
  if(!q){buildAccordion(GROUPS);return;}
  const filtered=GROUPS.map(g=>({...g,children:g.children.filter(c=>c.n.includes(q)||(c.s||'').includes(q))})).filter(g=>g.children.length>0);
  buildAccordion(filtered, true);
}

function toggleSubItem(key,el){
  if(subSelSet.has(key)){subSelSet.delete(key);el.classList.remove('checked');el.querySelector('.m-chk').textContent='';}
  else{subSelSet.add(key);el.classList.add('checked');el.querySelector('.m-chk').textContent='✓';}
  document.getElementById('subSelCount').textContent=`${subSelSet.size}件 選択中`;
}

function applySubSel(){
  if(!subSelSet.size){alert('品目を選択してください');return;}
  subSelSet.forEach(key=>{
    const [gi,ci]=key.split('__').map(Number);
    const it=GROUPS[gi]?.children[ci];
    if(it)addSub(subModalTargetPg,it);
  });
  closeSubModal();
}

// リセット
function resetForm(){
  if(!confirm('入力内容をリセットしますか？'))return;
  pgId=0;subId=0;
  document.getElementById('meisaiArea').innerHTML='';
  selTanto='';document.querySelectorAll('.tanto-badge').forEach(b=>b.classList.remove('sel'));
  window.onload();
}

  ws2.getRow(R2).height=18;s2mg(R2,1,R2,7);s2(R2,1,tPct2,S2.cell('right'));s2(R2,8,tax2,S2.num());s2(R2,9,'',S2.cell());R2++;

    ws2.getRow(R2).height=18;s2(R2,1,'No.',S2.subHd());s2mg(R2,2,R2,3);s2(R2,2,'名　称',S2.subHd());s2(R2,4,'材質・寸法',S2.subHd());s2mg(R2,5,R2,6);s2(R2,5,'数量',S2.subHd());s2(R2,7,'単価',S2.subHd());s2(R2,8,'金　額',S2.subHd());s2(R2,9,'備考',S2.subHd());R2++;
    let ino=1;

  });

  const dateStr=issueDate.replace(/-/g,'')||'';
  const fn=`見積書_${dateStr}_${clientName}.xlsx`;
